// 1. Main Settings
cl_color 255 255 255
con_enable "1" //Enables Console
gameinstructor_enable "0" //Removes in-game instructions
cl_showhelp "0" //Removes on-screen help
cl_autohelp "0" //Removes automatic help
cl_disablefreezecam "1" //Disables Freezecam
cl_disablehtmlmotd "1" //Removes "Message of the day" page when joining a server
cl_autowepswitch "0" //Disable auto-weapon switch
cl_join_advertise "2" //Let friends join your community servers
lobby_default_privacy_bits2 "0" //Set default lobby permissions to "friends need invite"

// Unbinds, avoid conflicts
unbind c
unbind t
unbind v
unbind x
unbind f
unbind o
unbind f4
unbind n
unbind k
unbind "i" //To not accidentally enable hud fade

// 2. Bindings (Personal)
bind "x" "+voicerecord" //Communicate with "x" instead of "K"
bind "f" "+lookatweapon; r_cleardecals" //Inspect your weapon with F
bind "f4" "ignoremsg" //Ignore chat by turning off enemies, teams and both
bind "n" "-attack" //ESL workaround for jump-throw
bind "mwheelup" "+jump"
alias z2 "connect 131.221.35.50:27029"
alias z3 "connect 131.221.35.50:27076"
alias admin "exec criskyadmin"
bind t +spray_menu
bind c "radio3"

bind "leftarrow" "+left" //Turn left with arrow key
bind "rightarrow" "+right" //Turn right with arrow key
 
// 3. Crosshair (New since 2018-07-24)
// Made with Crashz Crosshair Generator
cl_crosshair_drawoutline "0"
cl_crosshair_dynamic_maxdist_splitratio "0.35"
cl_crosshair_dynamic_splitalpha_innermod "1"
cl_crosshair_dynamic_splitalpha_outermod "0.5"
cl_fixedcrosshairgap "3"

cl_crosshair_dynamic_splitdist 7
cl_crosshair_friendly_warning 2
cl_crosshair_outlinethickness 1
cl_crosshair_sniper_show_normal_inaccuracy 0
cl_crosshair_sniper_width 1
cl_crosshair_t 0
cl_crosshairalpha 255
cl_crosshaircolor 5
cl_crosshaircolor_b 100
cl_crosshaircolor_g 0
cl_crosshaircolor_r 255
cl_crosshairdot 0                      
cl_crosshairgap -3
cl_crosshairgap_useweaponvalue 0
cl_crosshairsize 2
cl_crosshairstyle 4
cl_crosshairthickness 1
cl_crosshairusealpha 1


// 4. Hud
hud_scaling "0.95" //Scales hud elements to maximum value
hud_showtargetid "1" //Enables display of target names, important
cl_hud_bomb_under_radar "1" //Draws bomb under radar, convenient
cl_hud_color "8" //Makes the hud color yellow, for banana style
cl_hud_playercount_showcount "1" //Shows player avatars instead of numbers left
cl_hud_playercount_pos "0" //Puts player information in the top instead of bottom
cl_hud_healthammo_style "1" //Reverted hud style due to hidden burst mode
cl_hud_background_alpha "0.4" //Hidden but still visible black bars, easy on the eyes
cl_showloadout "0" //So it doesnt fade out the weapon slots, very annoying otherwise
safezonex "0.85" //Screen width percentage for the hud
safezoney "0.85" //Screen height percentage for the hud
 
// 5. Radar (Optimized radar settings)
cl_teammate_colors_show "1" //Show teammates as separate colors without letter
cl_hud_radar_scale "0.8" //Radar size, not too big and not too small
cl_radar_scale "0.5" //Radar map scale size, 0.4 works on all maps
cl_radar_always_centered "1" //Centers map instead of player
cl_radar_icon_scale_min "0.6" //Minimum player icon scale
 
// 6. Mouse ("Raw Input" & "No Acceleration")
bind "mouse1" "+attack"
bind "mouse4" "slot4"
bind "5" "slot5"
bind "6" "slot12"

m_rawinput "1" //Enable Raw Input for perfect precision (Raw input is unavailable on OSX)
m_mouseaccel2 "0" //Disables windows mouse acceleration initial threshold, safety precaution
m_mouseaccel1 "0" //Disables windows mouse acceleration initial threshold, safety precaution
m_customaccel "0" //Custom mouse acceleration disabled
m_mousespeed "0" //Windows mouse acceleration disabled, just for precaution
sensitivity "1.118" // editar
zoom_sensitivity_ratio_mouse "0.818933027098955175" //Fixes your zoom sensitivity to act as your real sensitivity, default value is 1
 
// 7. Viewmodel
viewmodel_fov "68.000000"
viewmodel_offset_z -10
viewmodel_offset_x 1
viewmodel_offset_y 10
viewmodel_recoil "1"
 
// 8. Bob (Less movement when you move around with weapons)
cl_bob_lower_amt "5" //How much the viewmodel lowers when running, set to lowest for less distraction
cl_bobamt_lat "0.1" //How much the viewmodel moves side to side when running, set to lowest for less distraction
cl_bobamt_vert "0.1" //How much the viewmodel moves up and down when running, set to lowest for less distraction
cl_bobcycle "0.98" //The frequency at which the viewmodel bobs, set to default
cl_viewmodel_shift_left_amt "0.5" //Lowers the crouching animation of the viewmodel
cl_viewmodel_shift_right_amt "0.25" //Lowers the crouching animation of the viewmodel
 
// 9. Rates (These network settings are optimized for high speed internet)
rate "128000" // Your download rate to the server. Max rate: "786432"
cl_cmdrate "128" //Max number of command packets sent to server per second
cl_updaterate "128" //Number of packets per second you are requesting from the server
cl_interp "0" //Sets the interpolation amount, always set this to 0
cl_interp_ratio "1" //Sets the interpolation amount (final amount is cl_interp_ratio / cl_updaterate)
cl_lagcompensation "0.5" //Lag compensation helps by eliminating combat latency from client side view
cl_predict "1" //Skip waiting for server feedback and simulate client side movement in real-time
cl_predictweapons "1" //Skip waiting for server feedback and perform client side prediction of weapon effects
 
// 10. Net (Netgraph positioning)
net_graph "1" //Shows my network usage data
net_graphheight "10" //Changes height
net_graphmsecs "400" //The latency graph represents this many milliseconds
net_graphpos "2" //Positioning of Net Graph
net_graphproportionalfont "0" //Makes font smaller
net_graphshowinterp "1" //Shows interpolation value
net_graphshowlatency "1" //Shows latency value
net_graphsolid "1" //Solid Net Graph
net_graphtext "1" //Shows text fields
net_maxroutable "1200" //Requested max packet size before packets are split
net_scale "5" //Makes font smaller
 
// 11. Video (Video settings and FPS Boosts)
fps_max "0" //Max frames per second, setting it to 0 causes long loading times
fps_max_menu "245" //Max frames per second in main-menu
mat_powersavingsmode "0" //Disables power saving mode
r_dynamic "0" //Affects dynamic lighting, turned off for more FPS
r_drawtracers 1
r_drawtracers_firstperson "1" // first person tracers, does not impact gameplay, just makes it easier to spray
mat_monitorgamma "1.60000"
mat_monitorgamma_tv_enabled "0"
 
// 12. Sound (optimized sound settings, does not affect your volume)
snd_hwcompat "1" // "Advanced 3D Audio Processing"
volume 0.1
snd_musicvolume_multiplier_inoverlay "0" // Disable music volume when Steam Overlay is active
voice_scale "0.03" //Turns down the volume of other players voice to 40%

// 13. Other
cl_use_opens_buy_menu "0" //Disables E from opening buy-menu, really useful
mm_dedicated_search_maxping "90" //Maxping Search in Matchmaking
func_break_max_pieces "0" //Less clutter from breaking vents (especially on Mirage)

echo Config Loaded!!! (2/2) //This just confirms that the config has ended successfully
 
