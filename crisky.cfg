sv_replaybots 0
muzzleflash_light 0
mat_postprocess_enable 0
mat_powersavingsmode 0
r_eyemove 0
r_eyegloss 0
func_break_max_pieces 0
budget_show_history 0
// Reboost
cl_disablefreezecam "1"
cl_disablehtmlmotd "1"
cl_forcepreload "0"
r_eyegloss "0"
r_eyemove "0"
r_eyeshift_x "0"
r_eyeshift_y "0"
